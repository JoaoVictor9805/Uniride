<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Viagem</title>
</head>
<body>
    <div>
        <div>
            <label for="placa">Placa: </label>
            <input type="text" id="placa" name="placa">
        </div>

        <div>
            <label for="marca">Marca: </label>
            <input type="text" id="marca" name="marca">
        </div>

        <div>
            <label for="modelo">Modelo: </label>
            <input type="text" id="modelo" name="modelo">
        </div>

        <div>
            <label for="ano">Ano: </label>
            <input type="number" id="ano" name="ano">
        </div>

        <div>
            <label for="cor">Cor: </label>
            <input type="text" id="cor" name="cor">
        </div>

        <div>
            <label for="renavam">RENAVAM: </label>
            <input type="text" id="renavam" name="renavam">
        </div>

        <div>
            <label for="capacidade">Capacidade de passageiros: </label>
            <input type="number" id="capacidade" name="capacidade">
        </div>

        <div>
            <label for="gastoCombustivel">Gasto de combustível (km/l): </label>
            <input type="number" step="0.1" id="gastoCombustivel" name="gastoCombustivel">
        </div>

        <div>
            <label for="categoria">Categoria: </label>
            <input type="text" id="categoria" name="categoria">
        </div>

        <div>
            <button type="button" id="enviar">Cadastrar veiculo</button>
        </div>

    </div>
    
    <script src="../javascript/novoCarro.js"></script>

</body>
</html>
