<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <div id="etapa-login">
        <h1>Área de Login</h1>

        <div>
            <label for="email">Digite email: </label>
            <input type="text" id="email" name="email" placeholder="seuemail@gmail.com">
        </div>

        <div>
            <label for="senha">Digite sua senha: </label>
            <input type="password" id="senha" name="senha">
        </div>

        <div>
            <button type="button" id="enviar">Login</button>        
        </div>
    </div>
    <div id="etapa-codigo" style="display: none;">
        <a href="https://outlook.live.com">Verificar Email</a>
    </div>
    <script type="module" src="../javascript/login.js"></script>

</body>
</html>
